<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRX Homelab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #c2c0b6;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: #161820;
      border-bottom: 1px solid #2a2c35;
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 48px;
      gap: 4px;
    }

    .nav-brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f0ede4;
      margin-right: 24px;
      white-space: nowrap;
    }

    .nav-tab {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5f5e5a;
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .nav-tab:hover { color: #c2c0b6; }
    .nav-tab.active { color: #f0ede4; border-bottom: 2px solid #378ADD; }
    .nav-tab.disabled { color: #3d3d3a; cursor: default; }
    .nav-tab.disabled:hover { color: #3d3d3a; }

    .page { display: none; flex: 1; padding: 40px 32px; }
    .page.active { display: flex; flex-direction: column; align-items: center; }

    .page-header { text-align: center; margin-bottom: 32px; }

    .page-header h1 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f0ede4;
      margin-bottom: 6px;
    }

    .page-header p {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #5f5e5a;
      text-transform: uppercase;
    }

    .diagram-wrap {
      width: 100%;
      max-width: 1020px;
      background: #161820;
      border: 1px solid #2a2c35;
      border-radius: 8px;
      padding: 32px 24px 24px;
    }

    svg text { font-family: 'Courier New', monospace; }

    .c-amber rect  { fill: #2a2210; stroke: #ba7517; stroke-width: 0.5; }
    .c-amber text  { fill: #FAC775; }
    .c-teal rect   { fill: #082820; stroke: #1D9E75; stroke-width: 0.5; }
    .c-teal text   { fill: #9FE1CB; }
    .c-green rect  { fill: #0e1f08; stroke: #3B6D11; stroke-width: 0.5; }
    .c-green text  { fill: #C0DD97; }
    .c-blue rect   { fill: #06152a; stroke: #185FA5; stroke-width: 0.5; }
    .c-blue text   { fill: #B5D4F4; }
    .c-coral rect  { fill: #2a1008; stroke: #993C1D; stroke-width: 0.5; }
    .c-coral text  { fill: #F5C4B3; }
    .c-purple rect { fill: #15102a; stroke: #534AB7; stroke-width: 0.5; }
    .c-purple text { fill: #CECBF6; }

    .node { cursor: pointer; }
    .node:hover rect { opacity: 0.82; }
    .th { font-size: 12px; font-weight: 700; }
    .ts { font-size: 10px; font-weight: 400; fill: #888780; }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #3d3d3a;
      text-transform: uppercase;
      border-top: 1px solid #1e2028;
    }
  </style>
</head>
<body>

<nav>
  <span class="nav-brand">SRX Homelab</span>
  <button class="nav-tab active" onclick="showPage('overview', this)">Lab Network Overview</button>
  <button class="nav-tab" onclick="showPage('backhaul', this)">Full-Tunnel Backhaul</button>
</nav>

<!-- Full-Tunnel Backhaul -->
<div class="page" id="page-backhaul">
  <div class="page-header">
    <h1>Full-Tunnel Backhaul</h1>
    <p>If traffic is not local to a spoke, it goes to the hub</p>
  </div>
  <div class="diagram-wrap">
    <svg width="100%" viewBox="0 0 840 720" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <marker id="aTeal"  markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
          <path d="M0,0 L7,3 L0,6 Z" fill="#1D9E75"/>
        </marker>
        <marker id="aAmber" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
          <path d="M0,0 L7,3 L0,6 Z" fill="#FAC775"/>
        </marker>
        <marker id="aGreen" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
          <path d="M0,0 L7,3 L0,6 Z" fill="#C0DD97"/>
        </marker>
      </defs>

      <!-- Internet -->
      <rect x="310" y="20" width="220" height="54" rx="6" style="fill:#1a1a18;stroke:#5F5E5A;stroke-width:0.5"/>
      <text class="th" x="420" y="40" text-anchor="middle" dominant-baseline="central" style="fill:#D3D1C7">Internet</text>
      <text class="ts" x="420" y="60" text-anchor="middle" dominant-baseline="central">via CSR1 · lo1 10.100.100.1/32</text>

      <!-- Internet egress (source-NAT) arrow: hub -> internet -->
      <line x1="420" y1="248" x2="420" y2="78" stroke="#FAC775" stroke-width="2" marker-end="url(#aAmber)"/>
      <text class="ts" x="432" y="162" dominant-baseline="central" style="fill:#FAC775">source-NAT → WAN 10.0.0.2</text>

      <!-- Hub -->
      <g class="node c-teal">
        <rect x="288" y="248" width="264" height="122" rx="6"/>
        <text class="th" x="420" y="272" text-anchor="middle" dominant-baseline="central" style="fill:#9FE1CB">srx01 — AutoVPN Hub</text>
        <text class="ts" x="420" y="294" text-anchor="middle" dominant-baseline="central">st0.0 terminates all spokes</text>
        <text class="ts" x="420" y="312" text-anchor="middle" dominant-baseline="central">source-NAT: spoke → internet</text>
        <text class="ts" x="420" y="330" text-anchor="middle" dominant-baseline="central">hairpin: spoke ↔ spoke (un-NAT'd)</text>
        <text class="ts" x="420" y="348" text-anchor="middle" dominant-baseline="central">default 0.0.0.0/0 → CSR1 (egress)</text>
      </g>

      <!-- IPsec tunnels (structural): spoke -> hub, arrow toward hub -->
      <line x1="120" y1="560" x2="348" y2="372" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aTeal)"/>
      <line x1="420" y1="560" x2="420" y2="374" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aTeal)"/>
      <line x1="720" y1="560" x2="492" y2="372" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#aTeal)"/>
      <text class="ts" x="206" y="470" text-anchor="middle" style="fill:#9FE1CB" transform="rotate(-39 206 470)">IPsec st0.0</text>
      <text class="ts" x="634" y="470" text-anchor="middle" style="fill:#9FE1CB" transform="rotate(39 634 470)">IPsec st0.0</text>

      <!-- Spoke-to-spoke hairpin (green): hub -> srx04, offset right of the tunnel -->
      <path d="M512,360 C600,430 690,470 736,556" fill="none" stroke="#C0DD97" stroke-width="2" stroke-dasharray="2 3" marker-end="url(#aGreen)"/>
      <text class="ts" x="640" y="392" dominant-baseline="central" style="fill:#C0DD97">spoke ↔ spoke hairpin</text>

      <!-- Spokes -->
      <g class="node c-teal">
        <rect x="30" y="560" width="180" height="98" rx="6"/>
        <text class="th" x="120" y="582" text-anchor="middle" dominant-baseline="central" style="fill:#9FE1CB">srx02 — spoke</text>
        <text class="ts" x="120" y="604" text-anchor="middle" dominant-baseline="central">LAN 192.168.2.0/24</text>
        <text class="ts" x="120" y="622" text-anchor="middle" dominant-baseline="central">WAN 10.0.1.2/30</text>
        <text class="ts" x="120" y="640" text-anchor="middle" dominant-baseline="central">default 0.0.0.0/0 → st0.0</text>
      </g>
      <g class="node c-teal">
        <rect x="330" y="560" width="180" height="98" rx="6"/>
        <text class="th" x="420" y="582" text-anchor="middle" dominant-baseline="central" style="fill:#9FE1CB">srx03 — spoke</text>
        <text class="ts" x="420" y="604" text-anchor="middle" dominant-baseline="central">LAN 192.168.3.0/24</text>
        <text class="ts" x="420" y="622" text-anchor="middle" dominant-baseline="central">WAN 10.0.2.2/30</text>
        <text class="ts" x="420" y="640" text-anchor="middle" dominant-baseline="central">default 0.0.0.0/0 → st0.0</text>
      </g>
      <g class="node c-teal">
        <rect x="630" y="560" width="180" height="98" rx="6"/>
        <text class="th" x="720" y="582" text-anchor="middle" dominant-baseline="central" style="fill:#9FE1CB">srx04 — spoke</text>
        <text class="ts" x="720" y="604" text-anchor="middle" dominant-baseline="central">LAN 192.168.4.0/24</text>
        <text class="ts" x="720" y="622" text-anchor="middle" dominant-baseline="central">WAN 10.0.3.2/30</text>
        <text class="ts" x="720" y="640" text-anchor="middle" dominant-baseline="central">default 0.0.0.0/0 → st0.0</text>
      </g>

      <!-- Legend -->
      <line x1="56" y1="690" x2="86" y2="690" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="5 4"/>
      <text class="ts" x="94" y="690" dominant-baseline="central">IPsec tunnel — all non-local traffic to hub</text>
      <line x1="430" y1="690" x2="460" y2="690" stroke="#FAC775" stroke-width="2"/>
      <text class="ts" x="468" y="690" dominant-baseline="central">internet egress — source-NAT</text>
      <line x1="660" y1="690" x2="690" y2="690" stroke="#C0DD97" stroke-width="2" stroke-dasharray="2 3"/>
      <text class="ts" x="698" y="690" dominant-baseline="central">spoke-to-spoke hairpin</text>
    </svg>
  </div>
</div>

<footer>SRX Homelab · Proxmox Homelab Automation Project</footer>
<script>
  function showPage(id, tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    tab.classList.add('active');
  }
</script>
</body>
</html>
